<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div>
    <div id="step-1">
        <h3>Şifrəni bərpa et</h3>
        <input type="email" id="email-input" placeholder="Emailinizi daxil edin">
        <button id="check-email-btn">Davam et</button>
    </div>
    <div id="step-2" style="display: none;">
        <h3>Yeni şifrənizi təyin edin</h3>
        <p id="display-email" style="font-weight: bold; color: blue;"></p>
        <input type="password" id="new-password" placeholder="Yeni şifrə">
        <button id="reset-password-btn">Şifrəni Yenilə</button>
    </div>

</div>
<script>
    let savedEmail = "";

    function checkEmail() {
        const email = document.getElementById('email-input').value;

        fetch(`http://localhost:8080/checkEmail?email=${email}`)
            .then(response => {
                if (response.ok) {
                    savedEmail = email;
                    document.getElementById('display-email').innerText = savedEmail;
                    document.getElementById('email-input').style.display = 'none';
                    document.getElementById('new-password').style.display = 'block';
                } else {
                    alert("No such a email");
                }
            })
            .catch(err => console.error("Error:", err));
    }

    function resetPassword() {
        const newPassword = document.getElementById('new-password').value;

        fetch(`http://localhost:8080/resetPassword?email=${savedEmail}&password=${newPassword}`, {
            method: 'PATCH'
        })
            .then(response => response.text())
            .then(message => {
                alert(message);
                location.reload();
            })
            .catch(err => alert(err));
    }
</script>
</body>
</html>
